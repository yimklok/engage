<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Engagement Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9f3e6 0%, #ffe6c9 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'Khmer OS', 'Moulpali', 'Noto Sans Khmer', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .greeting-card {
            background: rgba(255, 248, 235, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 4rem 2rem 4rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            padding: 2.5rem 3rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 215, 160, 0.6);
        }

        .greeting-icon {
            font-size: 4.5rem;
            margin-bottom: 0.75rem;
            filter: drop-shadow(2px 4px 8px rgba(0, 0, 0, 0.1));
        }

        .greeting-text {
            font-size: 2.2rem;
            font-weight: 600;
            color: #2d2418;
            word-break: break-word;
            line-height: 1.3;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #3e2a1f 0%, #5c3e28 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 1px 0 rgba(255, 255, 200, 0.4);
        }

        .greeting-name {
            font-size: 2.6rem;
            font-weight: 700;
            color: #b45f2b;
            display: inline-block;
            margin-top: 0.35rem;
            background: none;
            background-clip: unset;
            -webkit-background-clip: unset;
            color: #b1531c;
            text-shadow: 0 0 0 transparent;
            word-break: break-word;
        }

        .full-greeting {
            margin-top: 0.75rem;
            font-size: 2rem;
            font-weight: 500;
            color: #4a3727;
        }

        .param-badge {
            margin-top: 2rem;
            background: #efe2d0;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.4rem;
            font-size: 0.85rem;
            font-family: monospace;
            color: #5c3b22;
            border: 1px solid #e6cfb0;
            backdrop-filter: blur(4px);
        }

        .param-badge code {
            background: #2d2418;
            color: #ffdfb8;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .example-hint {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #a27b56;
            background: #fff4e8;
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            border: 1px dashed #e7c9aa;
        }

        .example-hint a {
            color: #b45a2a;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #c28a5a;
        }

        .example-hint a:hover {
            color: #7b3e18;
        }

        hr {
            margin: 1.2rem 0 0.8rem;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e7c9aa, #cfaa7a, #e7c9aa, transparent);
        }

        footer {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #b28b60;
        }

        @media (max-width: 550px) {
            .greeting-card {
                padding: 1.8rem;
            }

            .greeting-text {
                font-size: 1.6rem;
            }

            .full-greeting {
                font-size: 1.5rem;
            }

            .greeting-name {
                font-size: 1.9rem;
            }
        }

        .container {
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            background-color: red !important;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            position: relative;
        }
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <div class="container">
        <img class="bg-container" src="./assets/engagement-invitation-bg.gif" alt="bg">
        Hello Mobile Screen
    </div>

        <div class="greeting-icon">✨🌾</div>
        <div class="greeting-text">
            <span id="greetingPrefix">Hello</span>

        </div>
        <div class="full-greeting" id="fullMessage"></div>

    <script>
        (function () {
            // 1. Get current URL query parameters
            const urlParams = new URLSearchParams(window.location.search);

            // 2. Extract the "to" parameter value (preserve exact raw decoded string)
            let toValue = urlParams.get('to');

            // Elements for display
            const dynamicNameSpan = document.getElementById('dynamicName');
            const fullMessageDiv = document.getElementById('fullMessage');
            const paramDisplaySpan = document.getElementById('paramValueDisplay');

            // 3. Handle cases: null, empty string, or actual name(s)
            let displayName = '';
            let fullGreetingText = '';

            if (toValue === null || toValue.trim() === '') {
                // No "to" param OR empty value → fallback greeting
                displayName = 'Guest';
                fullGreetingText = 'Welcome! 🙏';
                paramDisplaySpan.textContent = '(not provided)';
                paramDisplaySpan.style.fontStyle = 'italic';
                paramDisplaySpan.style.opacity = '0.8';
            } else {
                // we have a valid "to" parameter (preserve original string, including spaces & Khmer)
                // Trim but keep internal spaces & special characters safe
                displayName = toValue.trim();
                // Build natural full greeting: "Hello [displayName]"
                fullGreetingText = `Hello ${displayName}`;
                paramDisplaySpan.textContent = displayName;
                paramDisplaySpan.style.fontStyle = 'normal';
                paramDisplaySpan.style.opacity = '1';
            }

            // 4. SECURE insertion: using textContent to prevent any XSS from malicious payloads
            // Even if the param contains HTML/JS, it will be rendered as plain text.
            // For the dynamic name inside the greeting we display it safely.
            if (dynamicNameSpan) {
                dynamicNameSpan.textContent = displayName;
            }

            if (fullMessageDiv) {
                // Show full message optionally, but we also show prefix + name.
                // For extra clarity, we can set the full message to be decorative
                if (toValue === null || toValue === '') {
                    fullMessageDiv.textContent = '✨ No "to" parameter? You are our honored guest. ✨';
                } else {
                    fullMessageDiv.textContent = `🎋 ${fullGreetingText} 🎋`;
                }
            }

            // Also optionally update the greetingPrefix part? Already static but we can add a flourish
            const prefixSpan = document.getElementById('greetingPrefix');
            if (prefixSpan && toValue && toValue.trim() !== '') {
                // just keep as "Hello" but maybe add slight variation
                prefixSpan.textContent = 'Hello';
            } else if (!toValue || toValue.trim() === '') {
                if (prefixSpan) prefixSpan.textContent = 'Welcome';
            }

            // Edge enhancement: if the name contains Khmer or special characters, ensure layout supports wrapping
            // The .greeting-name class already handles word-break: break-word;
            // Additionally, display raw param info on badge — done.

            // Extra: handle duplicate or multiple params? not needed, but we respect first occurrence.
            // If the "to" param is present but consists of only spaces, treat as empty.
            if (toValue !== null && toValue.trim() === '' && toValue.length > 0) {
                // corner: param exists but blank like "?to="
                dynamicNameSpan.textContent = 'Friend';
                fullMessageDiv.textContent = '🌸 Hello dear friend 🌸';
                paramDisplaySpan.textContent = '(empty value)';
                if (prefixSpan) prefixSpan.textContent = 'Hello';
            }

            // Add small utility: display the raw decoded param for debugging (optional but user-friendly)
            // Already updated paramDisplaySpan with displayName if present, but for blank edge re-check
            if (toValue !== null && toValue === '') {
                paramDisplaySpan.textContent = '␣ (blank)';
            }

            // For extremely long names, ensure proper scaling
            // Add title attribute to show full name if truncated due to overflow? But with word-wrap it's fine.
            if (dynamicNameSpan && displayName.length > 45) {
                dynamicNameSpan.setAttribute('title', displayName);
            }

            // Edge: if "to" contains URL encoded stuff — URLSearchParams already decodes correctly.
            // Example: "Klok%20and%20Thida" becomes "Klok and Thida"
            // Khmer example: %E1%9E%99%E1%9E%B8%E1%9E%98%20... becomes proper Khmer.
            console.log(`[greeting] to param =`, toValue);

            // Optional: if we want to support multiple names like "Klok&Thida"? Not needed, 
            // but '&' in param would be treated as new param. If someone wants literal '&' they must encode %26.
            // The spec expects "Klok and Thida" which is natural.
        })();
    </script>
</body>

</html>
