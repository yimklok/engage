<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Invitation</title>
    <!-- Font Awesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- AOS-Animate CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS File  -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Custom JavaScript File  -->
    <script src="assets/js/script.js" defer></script>
</head>

<body>
    <img class="engagement-bg-section" src="assets/images/engagement-invitation-bg.gif" alt="bg">
    <div class="engagement-content-section">
        <section class="engagement-container" id="engagementContainer">
            <div class="content" data-aos="zoom-in" data-aos-delay="150">
                <h3 data-aos="fade-up" data-aos-delay="150" class="engagement-title moul-regular">
                    សិរីមង្គលពិធីភ្ជាប់ពាក្យ
                </h3>
                <p data-aos="fade-up" data-aos-delay="300" class="icon-kt-container">
                    <img src="assets/images/logo.png" alt="logo">
                </p>
                <div data-aos="fade-up" data-aos-delay="450">
                    <h3 class="invite-title preahvihear-regular text-center">
                        សូមគោរពអញ្ជើញ
                    </h3>
                    <h3 class="melting-text moul-regular" id="myMeltingText"></h3>
                </div>
                <div data-aos="fade-up" data-aos-delay="600" class="btn-content">
                    <button class="bubbly-button open-btn dangrek-regular" id="btn">
                        <i class="fas fa-envelope-open-text"></i>
                        បើកធៀប
                    </button>
                    <p class="typewriter-container siemreap-regular">
                        សូមមេត្តា<span class="typewriter"></span>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <!-- AOS-Animate JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({//Global
            duration: 1000,
            offset: 150,
        });
    </script>
</body>

</html>
